<!-- admin.html -->

<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>관리자</title>

    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="../mstate/mstate.css">
    <link rel="stylesheet" href="../point/adpoint.css">

</head>

<body>

    <div class="container">

        <!-- 상단 -->
        <div class="header">

            <div class="leftHeader">

                <p class="hello">
                    안녕하세요!
                </p>

                <h2 class="title">
                    관리자님
                </h2>

            </div>

            <div class="rightHeader">

                <a
                    href="#"
                    id="excelBtn"
                    class="excelLink">
                    Excel UP/DOWN
                </a>

            </div>

        </div>

        <!-- Excel 모달 -->
        <div id="excelModal" class="modal hidden">

            <div class="modalBox">

                <div class="excelButton">

                    <button id="excelUploadBtn">
                        Excel Upload
                    </button>

                    <button id="excelDownloadBtn">
                        Excel Download
                    </button>

                </div>

            </div>

        </div>

        <hr class="line">

        <!-- 회원 관리 -->
        <div class="memberBox">

            <div class="memberTop">

                <h3 class="sectionTitle">
                    회원관리
                    <span id="memberCount" class="memberCount">(0명)</span>
                </h3>

                <div class="pointHeader">

                    <button
                        id="plusBtn"
                        class="pointBtn">
                        포인트 적립
                    </button>

                    <button
                        id="minusBtn"
                        class="pointBtn">
                        포인트 사용
                    </button>

                </div>

            </div>

            <hr class="line">            

            <div id="memberList">

                <!-- JS 생성 -->

            </div>
            
        </div>

    </div>

    <!-- 포인트 모달 -->
    <div id="pointModal" class="modal hidden">

        <div class="modalBox pointBox">

            <h3 id="pointTitle">포인트 적립</h3>

            <div class="pointScroll">
                <div id="pointRows"></div>
            </div>

            <div class="pointBtnBox">

                <button id="pointApplyBtn">
                    적용
                </button>

                <button id="pointCancelBtn">
                    취소
                </button>

            </div>

        </div>

    </div>

    <!-- 포인트 확인 모달 -->
    <div id="pointConfirmModal" class="modal hidden">

        <div class="modalBox">

            <p class="modalText">
                포인트를 적용하시겠습니까?
            </p>

            <div id="pointConfirmList" class="pointConfirmList">
                <!-- JS에서 생성 -->
            </div>

            <div class="modalBtnBox">

                <button id="pointConfirmBtn">
                    예
                </button>

                <button id="pointConfirmCancelBtn">
                    아니오
                </button>

            </div>

        </div>

    </div>

    <!-- 하단 안내 -->
    <div class="footerInfo">
        <div class="footerTitle">
            카카오톡 오픈채팅
        </div>

        <a
            href="https://open.kakao.com/o/g7b2DGti"
            target="_blank">
            8090 으차방
        </a>

        <div class="footerManager">
            <span>운영관리담당 : 코코</span>
            <span class="version">Ver 1.7</span>
        </div>
    </div>


    <!-- 알림 모달 -->
    <div id="alertModal" class="modal hidden">

        <div class="modalBox">

            <p id="alertMessage"></p>

            <div class="modalBtnBox">

                <button id="alertCloseBtn">
                    확인
                </button>

            </div>

        </div>

    </div>    


    <!-- 상태 변경 확인 모달 -->
    <div id="mstateModal" class="modal hidden">

        <div class="modalBox">

            <p id="mstateText" class="modalText">
                회원님을 외출 상태로 변경하시겠습니까?
            </p>

            <div class="modalBtnBox">

                <button id="mstateConfirm">
                    예
                </button>

                <button id="mstateCancel">
                    아니오
                </button>

            </div>

        </div>

    </div>


    <!-- 회원 포인트 내역 모달 -->
    <div id="historyModal" class="modal hidden">

        <div class="modalBox historyBox">

            <h3 id="historyTitle">
                포인트 내역
            </h3>


            <div id="historyList">

                <!-- JS 생성 -->

            </div>


            <div class="modalBtnBox">

                <button id="historyCloseBtn">
                    닫기
                </button>

            </div>

        </div>

    </div>    


    <!-- Excel 파일 선택 -->
    <input
        type="file"
        id="excelFile"
        accept=".xlsb,.xlsm,.xlsx,.xls"
        hidden>

    <!-- Excel 다운로드 모달 -->
    <div id="downloadModal" class="modal hidden">

        <div class="modalBox downloadBox">

        <p id="downloadTitle" class="downloadTitle">
            다운로드 항목을 선택하세요.
        </p>

            <div class="downloadCheck">

                <label>
                    <input type="checkbox" id="historyCheck">
                    history
                </label>

                <label>
                    <input type="checkbox" id="usersCheck">
                    users
                </label>

            </div>


            <div class="downloadButton">

                <button id="downloadStartBtn">
                    Download
                </button>

            </div>

        </div>

    </div>

    <script type="module" src="admin.js"></script>
    <script type="module" src="adminExcel.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</body>

</html>
