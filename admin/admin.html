<!-- admin.html -->

<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>관리자</title>

    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="../mstate/mstate.css">

</head>

<body>

    <div class="container">

        <!-- 상단 -->
        <div class="header">

            <div class="leftHeader">

                <p class="hello">
                    안녕하세요!
                </p>

                <h2 class="title">
                    관리자님
                </h2>

            </div>

            <div class="rightHeader">

                <a
                    href="#"
                    id="excelBtn"
                    class="excelLink">
                    💾 Excel 저장하기
                </a>

            </div>

        </div>

        <hr class="line">

        <!-- 회원 관리 -->
        <div class="memberBox">

            <div class="memberTop">

                <h3 class="sectionTitle">
                    회원관리
                </h3>

                <div class="pointHeader">

                    <button
                        id="plusBtn"
                        class="pointBtn">
                        포인트 적립
                    </button>

                    <button
                        id="minusBtn"
                        class="pointBtn">
                        포인트 사용
                    </button>

                </div>

            </div>

            <hr class="line">            

            <div id="memberList">

                <!-- JS 생성 -->

            </div>

        </div>

    </div>

    <!-- 하단 안내 -->
    <div class="footerInfo">
        <div class="footerTitle">
            카카오톡 오픈채팅
        </div>

        <a
            href="https://open.kakao.com/o/g7b2DGti"
            target="_blank">
            8090 으차방
        </a>

        <div class="footerManager">
            <span>운영관리담당 : 코코</span>
            <span class="version">Ver 1.4.1 ⓒ LINE</span>
        </div>
    </div>


    <!-- 상태 변경 확인 모달 -->
    <div id="mstateModal" class="modal hidden">

        <div class="modalBox">

            <p id="mstateText" class="modalText">
                홍길동님을 외출 상태로 변경하시겠습니까?
            </p>

            <div class="modalBtnBox">

                <button id="mstateConfirm">
                    예
                </button>

                <button id="mstateCancel">
                    아니오
                </button>

            </div>

        </div>

    </div>

    <script type="module" src="admin.js"></script>
    <script type="module" src="excel.js"></script>

</body>

</html>
